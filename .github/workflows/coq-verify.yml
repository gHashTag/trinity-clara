# ================================================================
# L-R14: coqc trinity-clara/proofs/igla/*.v = GREEN
# RACE INVALID if any theorem fails to compile
# φ² + φ⁻² = 3 | TRINITY | IGLA-INV-001
# ================================================================
name: Coq Invariants (L-R14)

on:
  push:
    branches: [main]
    paths:
      - 'proofs/**'
      - '.github/workflows/coq-verify.yml'
  pull_request:
    branches: [main]
    paths:
      - 'proofs/**'
  workflow_dispatch: {}

jobs:
  coq-verify:
    name: "coqc INV-1..5 (L-R14 Gate)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Use the upstream Coq image. The IGLA proofs import `Stdlib.Reals.*`
    # and `Stdlib.micromega.*`, the standard-library logical prefix used by
    # Coq 8.20 upstream. The Ubuntu `apt` coq package (8.20.1+dfsg) ships the
    # stdlib under the legacy `Coq` prefix only, so `Stdlib.Reals` fails to
    # resolve there — which is why this gate was red regardless of proof
    # content. The pinned upstream image resolves `Stdlib.*` natively.
    container:
      image: coqorg/coq:8.20.1
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Coq version
        run: coqc --version

      # All INV files Require Import CorePhi and use the `-R . IGLA` load path
      # declared in proofs/igla/_CoqProject, so build CorePhi first and compile
      # every invariant with that load path. Compiling a single file in
      # isolation (no -R, no CorePhi.vo) fails to resolve the local modules.
      - name: INV-0 — CorePhi (φ² + φ⁻² = 3 core, shared dependency)
        working-directory: proofs/igla
        run: coqc -R . IGLA CorePhi.v

      - name: INV-1 — lr_convergence (BPB decreases with real gradient)
        working-directory: proofs/igla
        run: coqc -R . IGLA lr_convergence.v

      - name: INV-2 — igla_asha_bound (champion survives, threshold=3.5)
        working-directory: proofs/igla
        run: coqc -R . IGLA igla_asha_bound.v

      - name: INV-3 — gf16_precision (error < φ⁻⁶ for d_model≥256)
        working-directory: proofs/igla
        run: coqc -R . IGLA gf16_precision.v

      - name: INV-4 — nca_entropy_band (entropy ∈ [1.5, 2.8])
        working-directory: proofs/igla
        run: coqc -R . IGLA nca_entropy_band.v

      - name: INV-5 — lucas_closure_gf16 (GF16 algebraically consistent)
        working-directory: proofs/igla
        run: coqc -R . IGLA lucas_closure_gf16.v

      - name: L-R14 Summary
        if: success()
        run: |
          echo "================================================"
          echo "✅ L-R14: ALL Coq invariants GREEN"
          echo "✅ INV-1 lr_convergence         — PROVEN"
          echo "✅ INV-2 asha_champion_survives — PROVEN"
          echo "✅ INV-3 gf16_safe_domain       — PROVEN"
          echo "✅ INV-4 nca_entropy_stability  — PROVEN"
          echo "✅ INV-5 lucas_closure_gf16     — PROVEN"
          echo "φ² + φ⁻² = 3 | IGLA RACE v2 VALID"
          echo "================================================"

      - name: L-R14 RACE INVALID
        if: failure()
        run: |
          echo "================================================"
          echo "❌ L-R14 VIOLATED: Coq proof failed"
          echo "❌ RACE INVALID until all theorems compile"
          echo "Fix: (cd proofs/igla && coqc -R . IGLA <file>.v) must exit 0"
          echo "================================================"
          exit 1
